<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitacora Leon Camila</title>

    <link rel="icon" type="image/x-icon" href="https://play-lh.googleusercontent.com/DpEIcJPiSQJb22lYSAnerRC5IlDt94itECqtlqhh97vKziX6LV8pyScGBCWiRfKCSMM">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fafafa;
        }
        body {
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        header {
            padding: 20px;
            background-color: rgb(135, 171, 222);
            color: white;
        }
       
        h1 {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin: 0;
        }

        main {
            flex: 1;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .logo-colegio {
            transition: transform 0.3s ease;
            cursor: pointer;
            width: 100px;
        }
        .logo-colegio:hover {
            transform: scale(1.1);
        }
        .logo-colegio:active {
            transform: scale(2.5);
        }

        .semana {
            background-color: rgb(135, 176, 222);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid #79a6d2;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            text-align: left;
            color: white;
        }
        .semana:hover {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .visor-pdf {
            width: 100%;
            height: 500px;
            border: 2px solid white;
            background-color: white;
            border-radius: 10px;
            margin-top: 15px;
        }

        .visor-video {
            width: 100%;
            max-height: 500px;
            border-radius: 10px;
            margin-top: 15px;
            border: 2px solid white;
            background-color: black;
        }

        .boton-descarga {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: white;
            color: burlywood;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .boton-descarga:hover {
            background-color: #f5f5f5;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            border-top: 1px solid rgb(147, 182, 230);
            background-color: rgb(135, 173, 222);
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bitacora Segunda y Tercera Unidad</h1>
    </header>

    <main>
        <div class="semana">
            <h3>Semana 1: Introducción Arduino</h3>
            <iframe src="recursos/Introducción Arduino. (1).pdf" class="visor-pdf"></iframe>
            <br>
            <a href="recursos/Introducción Arduino. (1).pdf" download class="boton-descarga">Descargar PDF</a>
        </div>
     </div>
    <div class="semana">
    <h2>Video de arduino</h2>
    <div class="pdf-container vacio">
        <div class="semana">

    <h2>Semana 3</h2>

    <video controls width="100%">
        <source src="recursos/8mb.video-stV-K6IEg3tZ.mp4">
    </video>
    </div>
        <p></p>
    </div>
    </div>
        <div class="semana">
    <h2>Semana 4</h2>

    <video controls width="100%">
        <source src="recursos/Video1Cams.mp4">
    </video>
</div>
    </main> 
    <footer>
        <span>@Leonncamila</span>
        <img src="https://www.capouilliez.edu.gt/assets/img/logo.png" height="25" width="100" alt="Logo Colegio" class="logo-colegio">
    </footer>

</body>
</html>
